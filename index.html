<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAMEED ULLAH IMAGE TO LINK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f0f2f5;
}

.container{
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    text-align:center;
    max-width:420px;
    width:100%;
}

h1{margin-bottom:20px;}

/* CIRCLE BUTTONS */
.links{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:20px;
}

.links a{
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:24px;
}

.whatsapp{background:#25D366;}
.toolkit{background:#111827;}

/* UPLOAD */
.upload-area{
    border:2px dashed #ccc;
    padding:30px;
    border-radius:12px;
    cursor:pointer;
}

.upload-area:hover{border-color:#4CAF50;}

input{display:none;}

#urlOutput{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-top:10px;
    text-align:center;
}

/* BUTTONS */
.btns{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:50px;
    cursor:pointer;
}

.green{background:#4CAF50;color:#fff;}
.dark{background:#444;color:#fff;}
</style>
</head>

<body>

<div class="container">

<h1>HAMEED ULLAH IMAGE TO LINK</h1>

<div class="links">
<a href="https://whatsapp.com/channel/0029Vb7v80n72WTshGXMjm2x" target="_blank" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<a href="https://toolkit.page.gd/t/hameedullah" target="_blank" class="toolkit">
<i class="fas fa-tools"></i>
</a>
</div>

<div class="upload-area" onclick="imageUpload.click()">
Click to Upload Image
<input type="file" id="imageUpload" accept="image/*">
</div>

<input type="text" id="urlOutput" placeholder="Image link will appear here">

<div class="btns">
<button class="btn green" onclick="upload()">Generate Link</button>
<button class="btn dark" onclick="copy()">Copy Link</button>
</div>

</div>

<script>
async function upload(){
    let file = document.getElementById("imageUpload").files[0];
    let output = document.getElementById("urlOutput");

    if(!file){
        alert("Select image first");
        return;
    }

    // 🔥 IMAGE COMPRESS (FIX BIG SIZE ISSUE)
    let img = new Image();
    let reader = new FileReader();

    reader.onload = function(e){
        img.src = e.target.result;
    };

    img.onload = async function(){
        let canvas = document.createElement("canvas");
        let ctx = canvas.getContext("2d");

        // Resize (MAX 800px)
        let maxWidth = 800;
        let scale = maxWidth / img.width;

        canvas.width = maxWidth;
        canvas.height = img.height * scale;

        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        let base64 = canvas.toDataURL("image/jpeg", 0.7).split(',')[1];

        let formData = new FormData();
        formData.append("key","274910e7dcf1794b3cdcce6956bc00b3");
        formData.append("image", base64);

        try{
            let res = await fetch("https://api.imgbb.com/1/upload",{
                method:"POST",
                body:formData
            });

            let data = await res.json();

            if(data.success){
                output.value = data.data.url;
            }else{
                alert("Upload failed (API issue)");
            }

        }catch(e){
            alert("Error: "+e.message);
        }
    };

    reader.readAsDataURL(file);
}

function copy(){
    let input = document.getElementById("urlOutput");

    if(!input.value){
        alert("No link yet");
        return;
    }

    input.select();
    document.execCommand("copy");
    alert("Copied!");
}
</script>

</body>
</html>
